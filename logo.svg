<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Constellation mark -->
  <!-- Lines connecting stars -->
  <line x1="12" y1="20" x2="24" y2="10" stroke="#00FF88" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="24" y1="10" x2="36" y2="20" stroke="#00FF88" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="36" y1="20" x2="24" y2="30" stroke="#00FF88" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="24" y1="30" x2="12" y2="20" stroke="#00FF88" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="24" y1="10" x2="24" y2="30" stroke="#00FF88" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="12" y1="20" x2="36" y2="20" stroke="#00FF88" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Star dots -->
  <circle cx="24" cy="10" r="2.2" fill="#00FF88"/>
  <circle cx="36" cy="20" r="2.8" fill="#00FF88"/>
  <circle cx="24" cy="30" r="2.2" fill="#00FF88"/>
  <circle cx="12" cy="20" r="1.8" fill="#00FF88" fill-opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="24" cy="20" r="1.4" fill="#7C3AED"/>

  <!-- Glow effect on main star -->
  <circle cx="36" cy="20" r="5" fill="#00FF88" fill-opacity="0.12"/>

  <!-- "Nexia" text -->
  <text x="48" y="27" font-family="'Inter', 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="0.04em" fill="#00FF88">Nexia</text>
</svg>
