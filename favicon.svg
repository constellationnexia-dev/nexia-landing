<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#050508"/>
  <!-- Constellation lines -->
  <line x1="16" y1="5" x2="27" y2="16" stroke="#00FF88" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="27" y1="16" x2="16" y2="27" stroke="#00FF88" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="16" y1="27" x2="5" y2="16" stroke="#00FF88" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="5" y1="16" x2="16" y2="5" stroke="#00FF88" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Star dots -->
  <circle cx="16" cy="5" r="2" fill="#00FF88"/>
  <circle cx="27" cy="16" r="2.5" fill="#00FF88"/>
  <circle cx="16" cy="27" r="2" fill="#00FF88"/>
  <circle cx="5" cy="16" r="1.5" fill="#00FF88" fill-opacity="0.7"/>
  <!-- Center -->
  <circle cx="16" cy="16" r="2" fill="#7C3AED"/>
  <circle cx="27" cy="16" r="5" fill="#00FF88" fill-opacity="0.1"/>
